configuration:
  url:
    name: Home Assistant URL
    description: The URL of your Home Assistant instance, optionally with the kiosk arg if you have that (e.g., http://homeassistant:8123/wallboard?kiosk)
  resolution:
    name: Screen Resolution
    description: The resolution for the VNC viewer in WIDTHxHEIGHT format (e.g., 1024x600)
  require_password:
    name: Require password
    description: When enabled, VNC requires the password below. When disabled, anyone who can reach the add-on port can connect (use only on trusted networks).
  password:
    name: VNC password
    description: Only used when "Require password" is on. Sent in clear text on your network. Optional auto-login in the URL, e.g. http://homeassistant.local:6080/?password=yoursupersecretpassword
network:
  6080/TCP: The port for the noVNC webpage. Open http://<home-assistant-host>:6080 in your browser (or the mapped port shown in the add-on).
